<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PMV Tienda de Música CEA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        async function api(path, method, body) {
            const res = await fetch('/api' + path, {
                method, headers: {'Content-Type': 'application/json'},
                body: body ? JSON.stringify(body) : null
            });
            alert(await res.text());
        }
    </script>
</head>
<body class="bg-gray-100 p-10 font-sans">
    <div class="max-w-xl mx-auto space-y-8">
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-xl font-bold mb-4 border-b">1. Registro de Artistas (HU-005)</h2>
            <input id="nArt" placeholder="Nombre Artista" class="w-full p-2 border mb-2">
            <button onclick="api('/artistas', 'POST', {nombre: nArt.value})" class="bg-blue-600 text-white p-2 rounded w-full">Guardar Artista</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-xl font-bold mb-4 border-b">2. Catálogo Maestro (HU-003)</h2>
            <input id="uD" placeholder="UPC-12345" class="w-full p-2 border mb-2 uppercase">
            <input id="tD" placeholder="Título" class="w-full p-2 border mb-2">
            <input id="sD" type="number" placeholder="Stock" class="w-full p-2 border mb-2">
            <button onclick="api('/discos', 'POST', {upc: uD.value, titulo: tD.value, stock: sD.value})" class="bg-green-600 text-white p-2 rounded w-full">Registrar Disco</button>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-black">
            <h2 class="text-xl font-bold mb-4 border-b">3. Terminal de Ventas (HU-002)</h2>
            <input id="uV" placeholder="Ingrese UPC" class="w-full p-2 border mb-2 uppercase">
            <button onclick="api('/ventas/'+uV.value, 'POST')" class="bg-black text-white p-2 rounded w-full">Confirmar Venta (Restar Stock)</button>
        </div>
    </div>
</body>
</html>
